<!DOCTYPE html>
<html>
	<head>
	    <meta charset="utf-8"/>
	    <title>{% block title %}{% endblock %}</title>
	    {% load static %}
	    <link rel="stylesheet" type="text/css" href="{% static 'hello/site.css' %}"/>
	</head>
	
	<body>
        <div class="navbar">
            <a href="{% url 'home' %}" class="navbar-brand {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
            <a href="{% url 'about' %}" class="navbar-item {% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a>
            <a href="{% url 'contact' %}" class="navbar-item {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">Contact</a>
        </div>
        
        <div class="body-content">
            {% block content %}
            {% endblock %}
            <hr/>
            <footer>
                <p>&copy; 2024</p>
            </footer>
        </div>
	</body>
</html>
